name: Kustomize Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: v5.6.0

      - name: Build Flux kustomization
        run: kustomize build src/k8s/flux

      - name: Build apps kustomization
        run: kustomize build src/k8s/apps

      - name: Build full kustomization
        run: kustomize build src/k8s
